runtime: python311
entrypoint: uvicorn main:app --host 0.0.0.0 --port $PORT

instance_class: F1

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 1

env_variables:
  # These should ideally be set in the GCP Console -> App Engine -> Settings -> Edit -> Environment variables
  # but I will add placeholders here for reference.
  GOOGLE_API_KEY: "YOUR_GOOGLE_API_KEY"
  COMPOSIO_API_KEY: "YOUR_COMPOSIO_API_KEY"
  COMPOSIO_USER_ID: "YOUR_USER_ID"
